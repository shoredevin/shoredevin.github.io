<!DOCTYPE html>
<html>
	<head>
		<title>mathgame</title>
		<link rel="stylesheet" type="text/css" href="styles.css">
	</head>
	<body>
		<h1>Solve the following question:</h1>
		<div id="containier" class="row">
			<div id="box1" class="block"></div>
			<div id="box2" class="block"></div>
			<div id="box3" class="block"></div>
		</div>
		<div id="buttonContainer">
			<div id="answerForm">	
				<input type="text" placeholder="type your answer here:" id="answer">
				<button id="submitAnswer" onclick="submitAnswer()">Submit</button>
			</div>
		</div>
		<div class="correctContainer">
			<p class="counter">Total correct answers: </p>	
			<p id="counterTotal" class="counter">0</p>
		</div>
		<div class="streakContainer"></div>
			<p class="counter">Correct answer streak:</p>
			<p id="counterStreak" class="counter">0</p>
		</div>
		<div class="highContainer"></div>
			<p class="counter">High Score:</p>
			<p id="highscore" class="counter"></p>
		</div>
	</body>
	<script src="scripts.js"></script>
</html>

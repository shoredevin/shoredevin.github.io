<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>CSS/JS Clock</title>
        <link rel="stylesheet" type="text/css" href="styles/styles.css">
        <link rel="shortcut icon" href="images/clock.ico" type="image/x-icon">
        <style id="random-style-elem">
        </style>
    </head>
    <body>
        <div>
            <div class="border">
                <div class="alarmInput">
                    <select name="Hour" id="hour" class="alarmSelector" onchange="writeAlarm()">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                    </select>
                    <select name="Minute" id="minute" class="alarmSelector" onchange="writeAlarm()">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                        <option value="13">13</option>
                        <option value="14">14</option>
                        <option value="15">15</option>
                        <option value="16">16</option>
                        <option value="17">17</option>
                        <option value="18">18</option>
                        <option value="19">19</option>
                        <option value="20">20</option>
                        <option value="21">21</option>
                        <option value="22">22</option>
                        <option value="23">23</option>
                        <option value="24">24</option>
                        <option value="25">25</option>
                        <option value="26">26</option>
                        <option value="27">27</option>
                        <option value="28">28</option>
                        <option value="29">29</option>
                        <option value="30">30</option>
                        <option value="31">31</option>
                        <option value="32">32</option>
                        <option value="33">33</option>
                        <option value="34">34</option>
                        <option value="35">35</option>
                        <option value="36">36</option>
                        <option value="37">37</option>
                        <option value="38">38</option>
                        <option value="39">39</option>
                        <option value="40">40</option>
                        <option value="41">41</option>
                        <option value="42">42</option>
                        <option value="43">43</option>
                        <option value="44">44</option>
                        <option value="45">45</option>
                        <option value="46">46</option>
                        <option value="47">47</option>
                        <option value="48">48</option>
                        <option value="49">49</option>
                        <option value="50">50</option>
                        <option value="51">51</option>
                        <option value="52">52</option>
                        <option value="53">53</option>
                        <option value="54">54</option>
                        <option value="55">55</option>
                        <option value="56">56</option>
                        <option value="57">57</option>
                        <option value="58">58</option>
                        <option value="59">59</option>
                    </select>
                    am <input type="radio" name="ampmButton" value="am" id="amCheck" class="alarmMeridiem" onchange="setAlarmMeridiem(this.value)">
                    pm <input type="radio" name="ampmButton" value="pm" id="pmCheck" class="alarmMeridiem" onchange="setAlarmMeridiem(this.value)">
                </div>
                <div class="clock red-dark" id="background">88:88:88</div>
                <div class="clock themed-elem red" id="clock"></div>
                <div class="meridiem">
                    <span class="light themed-elem" id="amLight"></span>
                    <span id="am" class="plainText">AM</span>
                </div>
                <div class="meridiem">
                    <span class="light themed-elem" id="pmLight"></span>
                    <span id="pm" class="plainText">PM</span>
                </div>
                <div class="alarmSetTime">
                    <span class="plainText">Alarm is set for:</span>
                    <span id="alarmTime" class="themed-elem">88:88</span>
                </div>
                <div class="alarmMeridiem">
                    <span class="light themed-elem red-dark" id="amAlarmLight"></span>
                    <span id="am" class="plainText"> AM </span>  
                    <span class="light themed-elem red-dark" id="pmAlarmLight"></span>
                    <span id="pm" class="plainText"> PM </span>
                </div>
            </div>
            <div id="snooze-container">
                <div id="snooze">
                    <button id="snoozeButton" onclick="snooze()">Snooze</button>
                </div>
                <p id="snoozeText">Snooze for this many minutes:</p>
                <div id="snoozeTime">
                    <select name="snoozeSelector" id="snoozeSelector" class="snoozeSelector">
                        <option value="10">10</option>
                        <option value="15">15</option>
                        <option value="20">20</option>
                        <option value="25">25</option>
                        <option value="30">Lazy Fucker</option>
                    </select>
                </div>
            </div>
            <div id="ringAlarm"><button onclick="ringAlarm()">Ring Alarm</button></div>
            <div>
                <select name="colorSelector" id="colorSelector" class="colorSelector" onchange="changeThemeColor(this.value)">
                    <option disabled selected="true">Choose Theme</option>
                    <option value="red">red</option> 
                    <option value="blue">blue</option> 
                    <option value="green">green</option>
                    <option value="purple">purple</option>
                    <option value="random">random</option>
                    <option value="random">random2</option>
                </select>
            </div>
        </div>
    </body>
    <script src="scripts/scripts.js"></script>
</html>

    <script>
        let prevSlot = undefined;
    
        function fillPokemonCell() {
          if(document.getElementById('pokemonNum').value == "") {
            alert('You must enter a Pokemon number');
          } else if(document.getElementById('pokemonNum').value < 1) {
            alert('There is not Pokemon with this ID');
            document.getElementById('pokemonNum').value = '';
          } else {
            if(prevSlot != undefined) {
              document.getElementById(prevSlot).innerHTML = '';
            }
            let pokemonNum = document.getElementById('pokemonNum').value;
            document.getElementById('pokemonNum').value = '';
            let box = Math.ceil(pokemonNum / 30);
            let slot = pokemonNum % 30;
            if(slot == 0) {
              slot = 30
            }
            document.getElementById('dialog').innerHTML = "Box: " + box + " Slot: " + slot;  
            document.getElementById(slot).innerHTML = "X";
            prevSlot = slot;
          }
    
        }

<!DOCTYPE html>
<html lang="en" >

<head>
  <meta charset="UTF-8">
  <title>A Pen by  Devin Shore</title>
  
  
  
      <link rel="stylesheet" href="css/style.css">

  
</head>

<body>

  <script src="https://www.dukelearntoprogram.com/course1/common/js/image/SimpleImage.js"></script>
<h1>Image Proceessing</h1>
<canvas id="can">
</canvas>
<div id="d1"><i>
  </i></div>
<P>
   <input type="file" 
      multiple="false" 
      accept="image/*" 
      id="finput" 
      onchange="upload()">
</P>


 Filters:
 <input type = "button"
         value = "Grayscale"
         onclick = "makeGray()"
        class="button">
  
  <input type = "button"
         value = "Red"
         onclick = "makeRed()"
         class="button">

        <input type = "button"
         value = "I'm Feeling Lucky"
         onclick = "makeLucky()"
               class="button">
  
          <input type = "button"
         value = "Blur"
         onclick = "makeBlur()"
                 class="button">

<P>
Frame Size (pixels): 
<input type = "text"
       id="framesize">
    <input type = "button"
         value = "Add Frame"
         onclick = "addFrame(document.getElementById('framesize').value)"
                 class="button">
</P>
<hr>
</hr>
<P>
   <input type = "button"
      value = "Reset Image"
      onclick = "reset()">
   <input type = "button"
      value = "Clear Canvas"
      onclick = "clearCan()">
</P>
  
  

    <script  src="js/index.js"></script>




</body>

</html>
